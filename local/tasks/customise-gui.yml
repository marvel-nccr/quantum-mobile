---
# Run as user

- name: Create folder for images
  become: true
  become_user: "{{ root_user }}"
  ansible.builtin.file:
    path: "{{ vm_data_folder }}/qm-customizations"
    state: directory
    mode: "0755"

- name: Copy the background image
  become: true
  become_user: "{{ root_user }}"
  ansible.builtin.copy:
    src: images/quantum-mobile-bg.png
    dest: "{{ vm_data_folder }}/qm-customizations/quantum-mobile-bg.png"
    mode: "0755"

- name: Set wallpaper
  # Note: This is applied immediately, no restart needed
  community.general.dconf:
    key: /org/gnome/desktop/background/picture-uri
    value: "'file://{{ vm_data_folder }}/qm-customizations/quantum-mobile-bg.png'"
    state: present

- name: Place new desktop icons in the top-left corner
  community.general.dconf:
    key: /org/gnome/shell/extensions/ding/start-corner
    value: "'top-left'"
    state: present

- name: Increase desktop font scaling
  community.general.dconf:
    key: /org/gnome/desktop/interface/text-scaling-factor
    value: "1.25"
    state: present

- name: Copy quamtum-mobile logo
  become: true
  become_user: "{{ root_user }}"
  ansible.builtin.copy:
    src: images/quantum-mobile-logo.png
    dest: /usr/share/icons/
    mode: "0644"

- name: Create desktop if not exists
  ansible.builtin.file:
    path: "${HOME}/Desktop"
    state: directory
    mode: "0755"

- name: Copy Firefox .desktop to Desktop
  ansible.builtin.copy:
    src: /var/lib/snapd/desktop/applications/firefox_firefox.desktop
    dest: "/home/{{ vm_user }}/Desktop/firefox_firefox.desktop"
    remote_src: true
    owner: "{{ vm_user }}"
    group: "{{ vm_user }}"
    mode: "0755"

- name: Mark Firefox shortcut as trusted
  ansible.builtin.command:
    cmd: dbus-run-session -- gio set /home/{{ vm_user }}/Desktop/firefox_firefox.desktop metadata::trusted true
  changed_when: true

- name: Remove update-notifier
  become: true
  become_user: "{{ root_user }}"
  ansible.builtin.apt:
    name: update-notifier
    state: absent
    purge: true
